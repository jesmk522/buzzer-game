<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buzzer 偵探 · 老街失蹤疑雲</title>
    <style>
      :root {
        --bg: #f7f3ec;
        --text: #2a2520;
        --accent: #b04a2f;
        --panel: rgba(255,255,255,.88);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Noto Serif TC", "PingFang TC", serif; background: var(--bg); color: var(--text); line-height: 1.7; }
      #app { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
      .detective-layout { display: grid; grid-template-columns: 1fr 240px; gap: 20px; }
      .bg { grid-column: 1 / -1; height: 180px; background-size: cover; background-position: center; border-radius: 8px; background-color: #c7b8a1; }
      .scene-title { grid-column: 1 / 2; font-size: 1.4rem; font-weight: 700; color: var(--accent); }
      .paragraphs { grid-column: 1 / 2; }
      .paragraphs p { margin: 0 0 12px; background: var(--panel); padding: 12px 16px; border-radius: 6px; }
      .choices { grid-column: 1 / 2; display: flex; flex-direction: column; gap: 8px; }
      .choice { padding: 12px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; text-align: left; font-size: 1rem; }
      .choice:hover { background: #8e3921; }
      .ev-badge { margin-left: 8px; opacity: 0.85; }
      .clues-panel { grid-column: 2 / 3; grid-row: 2 / 5; background: var(--panel); padding: 12px; border-radius: 6px; font-size: 0.9rem; }
      .clues-panel h3 { margin: 0 0 8px; }
      .clues-panel ul { list-style: none; padding-left: 0; }
      .clues-panel button { margin-top: 12px; padding: 6px 10px; background: #2a2520; color: #fff; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
      .ending-summary { background: #fff5de; padding: 16px; border-left: 4px solid var(--accent); border-radius: 6px; }
      @media (max-width: 640px) {
        .detective-layout { grid-template-columns: 1fr; }
        .clues-panel { grid-column: 1 / -1; grid-row: auto; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
